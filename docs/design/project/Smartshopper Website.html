<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Smartshopper · Website Explorations</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <style>
    html, body { margin: 0; padding: 0; background: #efece6; font-family: 'Bricolage Grotesque', sans-serif; }
    /* Pinning text inside artboards a bit tighter than browser default */
    .ss-board p, .ss-board div, .ss-board span { text-rendering: optimizeLegibility; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- design canvas + each artboard component -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="artboards/hero-landing.jsx"></script>
  <script type="text/babel" src="artboards/comparison-page.jsx"></script>
  <script type="text/babel" src="artboards/savings-dashboard.jsx"></script>
  <script type="text/babel" src="artboards/mobile-flow.jsx"></script>

  <script type="text/babel">
    const App = () => (
      <DesignCanvas
        title="Smartshopper · Website"
        subtitle="Bold & playful explorations for deal-hunters · 4 directions"
      >
        <DCSection
          id="marketing"
          title="Marketing surface"
          subtitle="Top-of-funnel — homepage hero treatments"
        >
          <DCArtboard id="hero-landing" label="01 · Hero landing — STOP OVERPAYING" width={1440} height={1080}>
            <HeroLanding />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="product"
          title="Product surfaces"
          subtitle="The core comparison experience"
        >
          <DCArtboard id="comparison-page" label="02 · Compare results page" width={1440} height={1080}>
            <ComparisonPage />
          </DCArtboard>

          <DCArtboard id="savings-dashboard" label="03 · Personal savings dashboard" width={1440} height={1080}>
            <SavingsDashboard />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="mobile"
          title="Mobile companion"
          subtitle="Scan in the aisle, save in real-time"
        >
          <DCArtboard id="mobile-flow" label="04 · Scan → Compare → Saved" width={1440} height={1080}>
            <MobileFlow />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
